name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
          # Add this if you haven't been using a requirements.txt
          # pip install pytest numpy scipy pandas
      - name: Install package
        run: |
          pip install -e .
      - name: Clean up and run tests
        run: |
          # 1. Remove any nested test folders that cause collection errors
          rm -rf src/tov-solver/tests
          
          # 2. Force remove pycache to ensure no old imports linger
          find . -type d -name "__pycache__" -exec rm -rf {} +
          
          # 3. Explicitly run only the root tests/ directory
          pytest tests/ --cov=src --cov-branch --cov-report=xml


      - name: Upload coverage reports to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }} # You get this from codecov.io
          files: ./coverage.xml

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        with:
          args: >
            -Dsonar.organization=rsouza01-1
            -Dsonar.projectKey=rsouza01_tov-solver.py
            -Dsonar.sources=src
            -Dsonar.python.coverage.reportPaths=coverage.xml